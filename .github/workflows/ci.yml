name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # ===========================================================================
  # STAGE 1 — Quality gate
  # Bloque les changements non conformes AVANT les tests lourds :
  # lint du code, conventions de commit, et detection de secrets.
  # ===========================================================================
  quality-gate:
    name: Quality gate — lint, commits & secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend (ESLint)
        working-directory: frontend
        run: npx eslint src/

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Lint backend (ESLint)
        working-directory: backend
        run: npx eslint .

      - name: Validate commit messages (commitlint)
        uses: wagoid/commitlint-github-action@v6

      - name: Scan for secrets (gitleaks)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect --source=/repo --redact --exit-code 1