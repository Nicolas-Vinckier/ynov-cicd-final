name: Merge CD

on:
  push:
    branches: [main]

jobs:
  # ===========================================================================
  # STAGE 1 — Quality gate
  # Bloque les changements non conformes AVANT les tests lourds :
  # lint du code, conventions de commit, et detection de secrets.
  # ===========================================================================
  quality-gate:
    name: Quality gate — lint, commits & secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend (ESLint)
        working-directory: frontend
        run: npx eslint src/

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Lint backend (ESLint)
        working-directory: backend
        run: npx eslint .

      - name: Validate commit messages (commitlint)
        uses: wagoid/commitlint-github-action@v6

      - name: Scan for secrets (gitleaks)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect --source=/repo --redact --exit-code 1

  # ===========================================================================
  # STAGE 2 — Tests & coverage
  # ===========================================================================
  backend-tests:
    name: Backend — tests & coverage
    needs: quality-gate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ matrix.os }}
          path: backend/coverage

  frontend-tests:
    name: Frontend — tests & coverage
    needs: quality-gate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        env:
          CI: true
        run: npm test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-${{ matrix.os }}
          path: frontend/coverage

  # ===========================================================================
  # STAGE 3 — Build & security scan (PAS de push ni de deploy)
  # ===========================================================================
  docker-build-scan:
    name: Build & scan (${{ matrix.service }})
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (for scan)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          load: true
          push: false
          tags: ${{ matrix.service }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  # ===========================================================================
  # STAGE 4 (partie images) — Build & push vers GHCR
  # ===========================================================================
  push-ghcr:
    name: Build & push (${{ matrix.service }})
    needs: docker-build-scan
    runs-on: ubuntu-latest 
    permissions:
      contents: read
      packages: write 
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend] 
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Define image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.service }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # STAGE 4 (partie deploy) — Deploy Render + smoke tests
  # Les etapes Render/smoke se SAUTENT tant que les secrets ne sont pas definis
  # -> la pipeline reste verte avant que Render soit configure.
  # ===========================================================================
  deploy:
    name: Deploy to Render & smoke tests
    needs: push-ghcr
    runs-on: ubuntu-latest
    env:
      RENDER_HOOK_BACKEND: ${{ secrets.RENDER_HOOK_BACKEND }}
      RENDER_HOOK_FRONTEND: ${{ secrets.RENDER_HOOK_FRONTEND }}
      PROD_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
      PROD_FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}
    steps:
      - name: Trigger Render deploy — backend
        if: env.RENDER_HOOK_BACKEND != '' # saute si le secret n'existe pas encore
        run: curl -fsSL -X POST "$RENDER_HOOK_BACKEND"

      - name: Trigger Render deploy — frontend
        if: env.RENDER_HOOK_FRONTEND != ''
        run: curl -fsSL -X POST "$RENDER_HOOK_FRONTEND"

      - name: Wait for Render to redeploy
        if: env.PROD_BACKEND_URL != '' || env.PROD_FRONTEND_URL != ''
        run: sleep 30

      - name: Smoke test — backend
        if: env.PROD_BACKEND_URL != ''
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "$PROD_BACKEND_URL/api/health"; then
              echo "Backend OK"; exit 0
            fi
            echo "Tentative $i echouee, nouvelle tentative dans 15s..."; sleep 15
          done
          echo "Backend injoignable"; exit 1

      - name: Smoke test — frontend
        if: env.PROD_FRONTEND_URL != ''
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "$PROD_FRONTEND_URL"; then
              echo "Frontend OK"; exit 0
            fi
            echo "Tentative $i echouee, nouvelle tentative dans 15s..."; sleep 15
          done
          echo "Frontend injoignable"; exit 1
