name: Pull Request CI

on:
  pull_request:
    branches: [main]

jobs:
  # ===========================================================================
  # STAGE 1 — Quality gate
  # Bloque les changements non conformes AVANT les tests lourds :
  # lint du code, conventions de commit, et detection de secrets.
  # ===========================================================================
  quality-gate:
    name: Quality gate — lint, commits & secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend (ESLint)
        working-directory: frontend
        run: npx eslint src/

      - name: Validate commit messages (commitlint)
        uses: wagoid/commitlint-github-action@v6

      - name: Scan for secrets (gitleaks)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect --source=/repo --redact --exit-code 1

  # ===========================================================================
  # STAGE 2 — Tests & coverage
  # ===========================================================================
  backend:
    name: Backend — tests & coverage
    needs: quality-gate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ matrix.os }}
          path: backend/coverage

  frontend:
    name: Frontend — tests & coverage
    needs: quality-gate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        env:
          CI: true
        run: npm test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-${{ matrix.os }}
          path: frontend/coverage

  # ===========================================================================
  # STAGE 3 — Build & security scan (PAS de push ni de deploy)
  # ===========================================================================
  docker:
    name: Build & scan (${{ matrix.service }})
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (for scan)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          load: true
          push: false
          tags: ${{ matrix.service }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
