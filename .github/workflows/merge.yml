name: Merge CD

on:
  push:
    branches: [main]

jobs:
  # ===========================================================================
  # STAGE 1 — Quality gate
  # ===========================================================================
  quality-gate:
    uses: ./.github/workflows/ci.yml

  # ===========================================================================
  # STAGE 2 — Tests & coverage
  # ===========================================================================
  backend-tests:
    name: Backend — tests & coverage
    needs: quality-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

  frontend-tests:
    name: Frontend — tests & coverage
    needs: quality-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        env:
          CI: true
        run: npm test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  # ===========================================================================
  # STAGE 3 — Single-pass Build, Scan & Push vers GHCR
  # ===========================================================================
  build-scan-push:
    name: Build, Scan & Push (${{ matrix.service }})
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Define image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.service }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build image locale pour scan
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          load: true
          push: false
          tags: ${{ matrix.service }}:scan
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}-${{ matrix.service }}:buildcache,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          vuln-type: "os,library"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image validée vers GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}-${{ matrix.service }}:buildcache

  # ===========================================================================
  # STAGE 4 — Deploy Render + smoke tests
  # ===========================================================================
  deploy:
    name: Deploy to Render & smoke tests
    needs: [backend-tests, frontend-tests, build-scan-push]
    runs-on: ubuntu-latest
    env:
      RENDER_HOOK_BACKEND: ${{ secrets.RENDER_HOOK_BACKEND }}
      RENDER_HOOK_FRONTEND: ${{ secrets.RENDER_HOOK_FRONTEND }}
      PROD_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
      PROD_FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}
    steps:
      - name: Trigger Render deploy — backend
        if: env.RENDER_HOOK_BACKEND != ''
        run: curl -fsSL -X POST "$RENDER_HOOK_BACKEND"

      - name: Trigger Render deploy — frontend
        if: env.RENDER_HOOK_FRONTEND != ''
        run: curl -fsSL -X POST "$RENDER_HOOK_FRONTEND"

      - name: Wait for Render to redeploy
        if: env.PROD_BACKEND_URL != '' || env.PROD_FRONTEND_URL != ''
        run: sleep 30

      - name: Smoke test — backend
        if: env.PROD_BACKEND_URL != ''
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "$PROD_BACKEND_URL/api/health"; then
              echo "Backend OK"; exit 0
            fi
            echo "Tentative $i echouee, nouvelle tentative dans 15s..."; sleep 15
          done
          echo "Backend injoignable"; exit 1

      - name: Smoke test — frontend
        if: env.PROD_FRONTEND_URL != ''
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "$PROD_FRONTEND_URL"; then
              echo "Frontend OK"; exit 0
            fi
            echo "Tentative $i echouee, nouvelle tentative dans 15s..."; sleep 15
          done
          echo "Frontend injoignable"; exit 1
