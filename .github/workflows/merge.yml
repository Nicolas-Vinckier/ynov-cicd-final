name: Merge CD

on:
  push:
    branches: [main]

jobs:
  # ===========================================================================
  # STAGE 1 — Quality gate
  # ===========================================================================
  quality-gate:
    uses: ./.github/workflows/ci.yml

  # ===========================================================================
  # STAGE 2 — Tests & coverage
  # ===========================================================================
  backend-tests:
    name: Backend — tests & coverage
    needs: quality-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage

  frontend-tests:
    name: Frontend — tests & coverage
    needs: quality-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          CI: true
        run: npm test -- --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage

  # ===========================================================================
  # STAGE 3 — Build + Scan + Push
  # ===========================================================================
  build-scan-push:
    name: Build, Scan & Push (${{ matrix.service }})
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:v0.31.0
            network=host

      - name: Define Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.service }}
          tags: |
            type=sha
            type=raw,value=latest

      # =========================================================================
      # BUILD + LOAD POUR SCAN LOCAL
      # =========================================================================
      - name: Build image for scan
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.service }}
          load: true
          push: false
          tags: ${{ matrix.service }}:scan
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      # =========================================================================
      # SECURITY SCAN
      # =========================================================================
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.service }}:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          vuln-type: os,library

      # =========================================================================
      # PUSH GHCR
      # =========================================================================
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ===========================================================================
  # STAGE 4 — Deploy + smoke tests
  # ===========================================================================
  deploy:
    name: Deploy to Render & smoke tests
    needs: build-scan-push
    runs-on: ubuntu-latest

    env:
      RENDER_HOOK_BACKEND: ${{ secrets.RENDER_HOOK_BACKEND }}
      RENDER_HOOK_FRONTEND: ${{ secrets.RENDER_HOOK_FRONTEND }}
      PROD_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
      PROD_FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}

    steps:
      - name: Trigger backend deploy
        if: env.RENDER_HOOK_BACKEND != ''
        run: curl -fsSL -X POST "$RENDER_HOOK_BACKEND"

      - name: Trigger frontend deploy
        if: env.RENDER_HOOK_FRONTEND != ''
        run: curl -fsSL -X POST "$RENDER_HOOK_FRONTEND"

      - name: Wait deploy
        run: sleep 30

      - name: Smoke test backend
        if: env.PROD_BACKEND_URL != ''
        run: |
          for i in 1 2 3 4 5; do
            curl -fsS "$PROD_BACKEND_URL/api/health" && exit 0
            sleep 10
          done
          exit 1

      - name: Smoke test frontend
        if: env.PROD_FRONTEND_URL != ''
        run: |
          for i in 1 2 3 4 5; do
            curl -fsS "$PROD_FRONTEND_URL" && exit 0
            sleep 10
          done
          exit 1
