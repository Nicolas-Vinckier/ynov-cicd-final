name: Pull Request CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ===========================================================================
  # STAGE 1 — Quality gate
  # ===========================================================================
  quality-gate:
    uses: ./.github/workflows/ci.yml

  # ===========================================================================
  # STAGE 2 — Tests & coverage
  # ===========================================================================
  backend:
    name: Backend — tests & coverage (${{ matrix.os }})
    needs: quality-gate
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-coverage-${{ matrix.os }}
          path: backend/coverage

  frontend:
    name: Frontend — tests & coverage (${{ matrix.os }})
    needs: quality-gate
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        env:
          CI: true
        run: npm test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: frontend-coverage-${{ matrix.os }}
          path: frontend/coverage

  # ===========================================================================
  # STAGE 3 — Build & security scan (no push, no deploy)
  # ===========================================================================
  docker:
    name: Build & Scan (${{ matrix.service }})
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:v0.31.0
            network=host

      - name: Build image for scan
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.service }}
          load: true
          push: false
          tags: ${{ matrix.service }}:scan
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.service }}:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          vuln-type: os,library
